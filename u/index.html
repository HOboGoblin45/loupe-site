<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loupe profile</title>
<meta name="description" content="A Loupe profile — independent fashion picks, curated and shoppable." />
<meta name="robots" content="noindex" />
<style>
  :root{
    --pink:#F3CBF0; --pink-soft:#FBEEFA; --ink:#1A1A1A; --muted:#6B6B6B;
    --line:#ECE8EC; --coral:#FE6F6F; --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--white);line-height:1.5;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .serif{font-family:Georgia,"Times New Roman",serif;}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}

  header.top{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line);z-index:10;}
  .top .row{display:flex;align-items:center;justify-content:space-between;height:58px;}
  .logo{font-weight:800;font-size:22px;letter-spacing:-1px;}
  .btn{display:inline-block;background:var(--ink);color:var(--white);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:700;}
  .btn-pink{background:var(--pink);color:var(--ink);}

  .hero{background:var(--pink-soft);padding:40px 0 28px;text-align:center;}
  .avatar{width:108px;height:108px;border-radius:999px;object-fit:cover;background:var(--pink);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;border:3px solid var(--white);box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden;}
  .avatar span{font-family:Georgia,serif;font-size:44px;color:var(--ink);font-weight:700;}
  .display{font-size:26px;letter-spacing:-.5px;margin-bottom:2px;}
  .handle{color:var(--muted);font-size:15px;margin-bottom:12px;}
  .bio{max-width:46ch;margin:0 auto 14px;color:var(--ink);font-size:15px;}
  .socials{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;}

  .section{padding:28px 0 8px;}
  .section h2{font-size:13px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);}}
  .card{display:block;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--white);}
  .card .imgwrap{aspect-ratio:3/4;background:#F6F4F6;overflow:hidden;}
  .card img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .m{padding:10px 11px 12px;}
  .card .b{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .card .n{font-size:13px;line-height:1.25;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
  .card .r{display:flex;align-items:center;justify-content:space-between;}
  .card .p{font-size:13px;font-weight:700;}
  .card .s{font-size:11px;font-weight:800;color:var(--coral);}

  .getapp{text-align:center;padding:40px 0 56px;}
  .getapp h3{font-size:22px;letter-spacing:-.5px;margin-bottom:6px;}
  .getapp p{color:var(--muted);font-size:14px;margin-bottom:16px;}

  .state{text-align:center;padding:80px 20px;color:var(--muted);}
  .state .big{font-size:20px;color:var(--ink);margin-bottom:8px;}
  .disclosure{border-top:1px solid var(--line);padding:22px 0;}
  .disclosure p{text-align:center;font-size:12px;color:var(--muted);max-width:64ch;margin:0 auto;}

  #iab-hint{display:none;position:fixed;left:12px;right:12px;bottom:14px;background:#1A1A1A;color:#fff;padding:13px 15px;border-radius:14px;font-size:13px;line-height:1.4;text-align:center;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.25);}
</style>
</head>
<body>

<header class="top">
  <div class="wrap row">
    <a href="https://useloupe.shop" class="logo">Loupe</a>
    <a href="https://apps.apple.com/app/id6781137336" target="_blank" rel="noopener" class="btn btn-pink">Get the app</a>
  </div>
</header>

<main id="main">
  <div class="state"><div class="big">Loading profile…</div></div>
</main>

<div class="disclosure">
  <div class="wrap"><p><strong>Affiliate disclosure:</strong> Loupe may earn a commission when you buy through links on this page, at no extra cost to you.</p></div>
</div>

<div id="iab-hint">Tapping a product opens the store. If it's blocked here, tap <strong>•••</strong> → <strong>Open in browser</strong>.</div>

<script>
(function(){
  var SB  = "https://aruguxhcexfvyyfboklt.supabase.co";
  var KEY = "sb_publishable_MfK9YAdnRuJ0B3FmvBkQhA_uBguMBHJ";
  var APPSTORE = "https://apps.apple.com/app/id6781137336";

  var ua = navigator.userAgent || "";
  if(/TikTok|musical_ly|Bytedance|Instagram|FBAN|FBAV|FB_IAB|Line\//i.test(ua)){
    var h = document.getElementById('iab-hint'); if(h) h.style.display='block';
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function qs(name){
    var m = new RegExp('[?&]'+name+'=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : '';
  }

  function card(it){
    if(!it || !it.image) return '';
    var url = it.url || APPSTORE;
    return '<a class="card" href="'+esc(url)+'" target="_blank" rel="noopener nofollow sponsored">'
      + '<div class="imgwrap"><img loading="lazy" src="'+esc(it.image)+'" alt="'+esc(it.name||'')+'"></div>'
      + '<div class="m"><div class="b">'+esc(it.brand||'')+'</div>'
      + '<div class="n">'+esc(it.name||'')+'</div>'
      + '<div class="r"><span class="p">'+(typeof it.price==='number'?'$'+it.price:'')+'</span>'
      + '<span class="s">Shop →</span></div></div></a>';
  }

  function grid(title, items){
    if(!Array.isArray(items) || !items.length) return '';
    var cards = items.map(card).join('');
    if(!cards.trim()) return '';
    return '<section class="section wrap"><h2>'+esc(title)+'</h2><div class="grid">'+cards+'</div></section>';
  }

  function render(p){
    var initial = (p.display_name||p.username||'?').trim().charAt(0).toUpperCase();
    var avatar = p.avatar_url
      ? '<div class="avatar"><img src="'+esc(p.avatar_url)+'" alt=""></div>'
      : '<div class="avatar"><span>'+esc(initial)+'</span></div>';

    var socials = '';
    if(p.instagram_handle) socials += '<a class="chip" target="_blank" rel="noopener" href="https://instagram.com/'+esc(p.instagram_handle)+'">Instagram @'+esc(p.instagram_handle)+'</a>';
    if(p.tiktok_handle)    socials += '<a class="chip" target="_blank" rel="noopener" href="https://tiktok.com/@'+esc(p.tiktok_handle)+'">TikTok @'+esc(p.tiktok_handle)+'</a>';

    var hero = '<section class="hero"><div class="wrap">'
      + avatar
      + '<h1 class="display serif">'+esc(p.display_name||('@'+p.username))+'</h1>'
      + '<div class="handle">@'+esc(p.username)+'</div>'
      + (p.bio ? '<p class="bio">'+esc(p.bio)+'</p>' : '')
      + (socials ? '<div class="socials">'+socials+'</div>' : '')
      + '</div></section>';

    var body = '';
    body += grid('Dresser', p.share_closet ? p.closet : null);
    body += grid('Likes',   p.share_likes  ? p.likes  : null);
    // Looks snapshots can carry a flat items[] of products; render those if present.
    if(p.share_looks && Array.isArray(p.looks)){
      var lookItems = [];
      p.looks.forEach(function(l){ if(l && Array.isArray(l.items)) lookItems = lookItems.concat(l.items); });
      body += grid('Looks', lookItems);
    }

    if(!body.trim()){
      body = '<div class="state"><div class="big">Nothing shared yet</div>'
        + '<div>This profile is just getting started.</div></div>';
    }

    var getapp = '<section class="getapp"><div class="wrap">'
      + '<h3 class="serif">Discover fashion like '+esc(p.display_name||('@'+p.username))+'</h3>'
      + '<p>Swipe, save, and shop independent brands on Loupe.</p>'
      + '<a class="btn" href="'+APPSTORE+'" target="_blank" rel="noopener">Get Loupe on the App Store</a>'
      + '</div></section>';

    document.getElementById('main').innerHTML = hero + body + getapp;
    document.title = (p.display_name||('@'+p.username)) + ' · Loupe';
  }

  function notFound(){
    document.getElementById('main').innerHTML =
      '<div class="state"><div class="big">Profile not found</div>'
      + '<div>This link may be inactive. Discover independent fashion on Loupe.</div>'
      + '<div style="margin-top:18px"><a class="btn" href="'+APPSTORE+'" target="_blank" rel="noopener">Get Loupe</a></div></div>';
  }

  var username = qs('u');
  if(!username){ notFound(); return; }

  fetch(SB + '/rest/v1/rpc/get_social_profile', {
    method:'POST',
    headers:{ 'apikey':KEY, 'Authorization':'Bearer '+KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({ p_username: username })
  })
  .then(function(r){ return r.ok ? r.json() : []; })
  .then(function(rows){
    var p = Array.isArray(rows) ? rows[0] : rows;
    if(!p || !p.username){ notFound(); return; }
    render(p);
  })
  .catch(notFound);
})();
</script>
</body>
</html>
