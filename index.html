<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loupe — Get the app</title>
<meta name="description" content="Loupe — swipe to discover independent fashion. Get it free on the App Store." />
<meta name="robots" content="noindex" />

<!--
  SMART REDIRECT: normal browsers (Safari/Chrome/desktop) jump straight to the
  App Store. In-app browsers (TikTok / Instagram / Facebook / etc.) do NOT
  redirect — they block app-store auto-redirects — so they get the clean
  one-tap download page below instead. This runs before the body paints, so
  redirected users never see a flash.
-->
<script>
(function(){
  var APP = "https://apps.apple.com/app/id6781137336";
  var ua = navigator.userAgent || "";
  var inApp = /TikTok|musical_ly|Bytedance|Instagram|FBAN|FBAV|FB_IAB|Snapchat|Pinterest|Line\/|Twitter|LinkedInApp|GSA|YaBrowser/i.test(ua);
  if(!inApp){ try{ location.replace(APP); }catch(e){ location.href = APP; } }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<style>
  :root{--pink:#F3CBF0;--pink-soft:#FCEFF8;--ink:#141414;--muted:#6E6A6E;--white:#fff;--line:#ECE7EC;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--pink-soft);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  a{text-decoration:none;}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 22px 28px;}
  .logo{font-family:"Allura",cursive;font-size:64px;line-height:1;color:var(--ink);margin-bottom:6px;}
  .tag{font-size:16px;color:var(--muted);margin-bottom:26px;}
  .phone{width:208px;border:8px solid #0E0E12;border-radius:38px;overflow:hidden;background:#0E0E12;box-shadow:0 24px 56px -22px rgba(20,10,30,.5);margin-bottom:30px;position:relative;}
  .phone::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40%;height:18px;background:#0E0E12;border-radius:0 0 13px 13px;z-index:2;}
  .phone img{display:block;width:100%;height:auto;border-radius:30px;}
  .btn{display:inline-block;background:var(--ink);color:var(--white);padding:16px 34px;border-radius:999px;font-size:17px;font-weight:600;}
  .hint{margin-top:20px;font-size:13.5px;color:var(--muted);max-width:30ch;line-height:1.5;}
  .hint b{color:var(--ink);}
  footer{padding:18px;text-align:center;font-size:12px;color:var(--muted);}
</style>
</head>
<body>
  <main class="wrap">
    <div class="logo">Loupe</div>
    <div class="tag">Niche fashion, curated for you.</div>
    <div class="phone"><img src="/screens/discover.jpg" alt="Loupe app" /></div>
    <a class="btn" href="https://apps.apple.com/app/id6781137336">Download on the App Store</a>
    <p class="hint">Opened from TikTok or Instagram? For the smoothest install, tap <b>•••</b> (top-right) → <b>Open in browser</b>.</p>
  </main>
  <footer>© 2026 Loupe · <a href="/v2/" style="color:inherit;text-decoration:underline;">About the app</a></footer>
</body>
</html>
